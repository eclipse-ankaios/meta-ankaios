name: Lint recipes

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Recipe lint
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/eclipse-ankaios/ankaios-yocto-devcontainer
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Lint recipes
        run: |
          set -eu
          files="$(find recipes-ankaios -type f -name '*.bb' | sort)"
          failed=0
          for file in $files; do
            echo "PARSED: $file"
            output="$(oelint-adv --quiet --hide info --relpaths "$file" 2>&1 | grep -v '\.inc:' || true)"
            if [ -n "$output" ]; then
              printf '%s\n' "$output"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ]
