name: Lint recipes

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Recipe lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint recipes
        uses: devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5 # v0.3
        with:
          imageName: ghcr.io/eclipse-ankaios/meta-ankaios-devcontainer
          runCmd: just lint
