header:
  version: 14

# The machine as it is written into the `local.conf` of bitbake.
machine: qemux86-64
# The distro name as it is written into the `local.conf` of bitbake.
distro: poky

target: core-image-minimal

repos:
  meta-ankaios:

  bitbake:
    url: "https://git.openembedded.org/bitbake"
    branch: "2.16"
    path: layers/bitbake
    layers: {}

  openembedded-core:
    url: "https://git.openembedded.org/openembedded-core"
    branch: whinlatter
    layers:
      meta:
    path: layers/openembedded-core

  meta-yocto:
    url: "https://git.yoctoproject.org/meta-yocto"
    branch: whinlatter
    layers:
      meta-poky:
      meta-yocto-bsp:
    path: layers/meta-yocto

  meta-openembedded:
    url: "https://git.openembedded.org/meta-openembedded"
    branch: whinlatter
    layers:
      meta-oe:
      meta-python:
      meta-networking:
      meta-filesystems:      
    path: layers/meta-openembedded

  meta-virtualization:
    url: "https://git.yoctoproject.org/meta-virtualization"
    branch: whinlatter
    path: layers/meta-virtualization

bblayers_conf_header:
  meta-ankaios: |
    POKY_BBLAYERS_CONF_VERSION = "2"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""
local_conf_header:
  meta-ankaios: |
    EXTRA_IMAGE_FEATURES ?= "allow-empty-password empty-root-password allow-root-login"
    USER_CLASSES ?= "buildstats"
    PATCHRESOLVE = "noop"
    BB_DISKMON_DIRS ??= "\
        STOPTASKS,${TMPDIR},1G,100K \
        STOPTASKS,${DL_DIR},1G,100K \
        STOPTASKS,${SSTATE_DIR},1G,100K \
        STOPTASKS,/tmp,100M,100K \
        HALT,${TMPDIR},100M,1K \
        HALT,${DL_DIR},100M,1K \
        HALT,${SSTATE_DIR},100M,1K \
        HALT,/tmp,10M,1K"

    # Yocto Project SState Mirror 
    BB_HASHSERVE_UPSTREAM = 'wss://hashserv.yoctoproject.org/ws'
    SSTATE_MIRRORS ?= "file://.* http://sstate.yoctoproject.org/all/PATH;downloadfilename=PATH"
    # Enable reuse of sstate by detecting when a given sstate artifact can be reused as equivalent
    BB_HASHSERVE = "auto"
    BB_SIGNATURE_HANDLER = "OEEquivHash"
    
    # No SDL (Simple DirectMedia Layer) support required for the minimal image
    # PACKAGECONFIG:append:pn-qemu-system-native = " sdl"

    CONF_VERSION = "2"
    DISTRO_FEATURES:append = " virtualization"

    # Uncomment to build an uncompressed image that does not require to run with snapshot
    # IMAGE_FSTYPES:remove = " ext4.zst"
    # IMAGE_FSTYPES:append = " ext4"

    # Required for the podman CNI portmap
    IMAGE_INSTALL:append = " kernel-module-xt-multiport"

    # Add 2GB of extra space to the root filesystem
    IMAGE_ROOTFS_EXTRA_SPACE = "2000000"

    # Add init-basics to the image, which provides basic init scripts for dns and cgroup mounting
    IMAGE_INSTALL:append = " init-basics"

    # Add additional nice tools ;)
    IMAGE_INSTALL:append = " curl"

    # Add ankaios and podman to the image
    IMAGE_INSTALL:append = " podman ankaios"

    # Add SysV init scripts for ankaios (ank-server + ank-agent)
    IMAGE_INSTALL:append = " sysvinit-ankaios"
