BB_CONF_FRAGMENT_SUMMARY = "Ankaios minimal sysvinit configuration"
BB_CONF_FRAGMENT_DESCRIPTION = "Adds the same local.conf customizations used by kas-minimal-sysvinit.yml and kas-common.yml for the Ankaios minimal image build."

require conf/fragments/ankaios/common.conf

# Sysvinit-specific settings from kas-minimal-sysvinit.yml
IMAGE_INSTALL:append = " init-basics"
IMAGE_ROOTFS_EXTRA_SPACE = "2000000"
IMAGE_ROOTFS_EXTRA_SPACE:raspberrypi4-64 = "0"
IMAGE_ROOTFS_EXTRA_SPACE:raspberrypi5 = "0"