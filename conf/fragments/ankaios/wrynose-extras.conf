BB_CONF_FRAGMENT_SUMMARY = "Wrynose-specific kernel module extras"
BB_CONF_FRAGMENT_DESCRIPTION = "Adds kernel modules that are built as modules on Wrynose but built-in on other releases."

# On Wrynose the veth driver is a loadable module, required for container networking (veth pairs)
IMAGE_INSTALL:append:raspberrypi4-64 = " kernel-module-veth"
IMAGE_INSTALL:append:raspberrypi5 = " kernel-module-veth"
